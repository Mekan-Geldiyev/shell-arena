<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; display: block; overflow: hidden; background: #87CEEB; }
        .ui { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 100; color: white; font-family: 'Arial Black', sans-serif; }
        .hidden { display: none !important; }
        header { background: #5F9EA0; padding: 15px 30px; display: flex; justify-content: space-between; border-bottom: 4px solid #4682B4; }
        .sidebar { position: absolute; left: 30px; top: 120px; display: flex; flex-direction: column; gap: 20px; }
        .nav-btn { background: #4682B4; width: 60px; height: 60px; border: none; cursor: pointer; border-radius: 50%; font-size: 24px; color: white; }
        .center-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 40px 100px; font-size: 40px; background: #e67e22; border: 6px solid #d35400; color: white; cursor: pointer; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(4, 150px); gap: 20px; padding: 80px; }
        .item-card { background: #5F9EA0; padding: 20px; border: 2px solid #4682B4; text-align: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loginPage" class="ui" style="background:#5F9EA0; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <button onclick="show('mainMenu')" style="padding:20px 40px; font-size:24px;">GMAIL SIGN IN</button>
    </div>
    <div id="mainMenu" class="ui hidden">
        <header>
            <div>Mergen</div>
            <div style="background:#4682B4; padding:8px 16px; border-radius:8px;">🥚 <span id="eggCount">0</span></div>
        </header>
        <div class="sidebar">
            <button class="nav-btn" onclick="show('invPage')">🎒</button>
            <button class="nav-btn" onclick="show('shopPage')">🛒</button>
        </div>
        <button class="center-btn" onclick="startGame()">PLAY</button>
    </div>
    <div id="invPage" class="ui hidden" style="background:#87CEEB;">
        <header><button class="nav-btn" onclick="show('mainMenu')" style="width:auto; border-radius:0;">⬅️</button></header>
        <div class="grid" id="invGrid"></div>
    </div>
    <div id="shopPage" class="ui hidden" style="background:#87CEEB;">
        <header><button class="nav-btn" onclick="show('mainMenu')" style="width:auto; border-radius:0;">⬅️</button></header>
        <div class="grid" id="shopGrid"></div>
    </div>
    <canvas id="renderCanvas"></canvas>
    <script>
        const defaults = ["EggK-47", "Scrambler", "Crackshot", "RPEGG"];
        const skins = ["Golden EggK-47", "Blue Scrambler", "Neon Crackshot"];
        defaults.forEach(i => { document.getElementById('invGrid').innerHTML += `<div class="item-card">${i}</div>`; });
        skins.forEach(s => { document.getElementById('shopGrid').innerHTML += `<div class="item-card">${s}<br><button onclick="alert('Purchased')">BUY</button></div>`; });
        function show(id) { document.querySelectorAll('.ui').forEach(el => el.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function startGame() { document.getElementById('mainMenu').classList.add('hidden'); canvas.requestPointerLock(); }
        const engine = new BABYLON.Engine(document.getElementById("renderCanvas"), true);
        const scene = new BABYLON.Scene(engine);
        engine.runRenderLoop(() => { scene.render(); });
    </script>
</body>
</html>
